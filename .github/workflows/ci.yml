name: LoLLMS CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:

  security-frontend:
    name: Frontend security scan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend/webui
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/webui/package-lock.json
      - name: Install (clean)
        run: npm ci --ignore-scripts
      - name: npm audit
        run: npm audit --audit-level=high
      - name: Socket security scan
        run: npx --yes socket ci
        continue-on-error: true  # add this line
        env:
          SOCKET_SECURITY_API_KEY: ${{ secrets.SOCKET_SECURITY_API_KEY }}
      - name: Check for obfuscated code
        run: |
          grep -rn '\beval\s*(' src/ --include="*.js" --include="*.ts" --include="*.vue" && exit 1 || true
          grep -rn '\\x[0-9a-fA-F]\{4,\}' src/ --include="*.js" --include="*.ts" && exit 1 || true
          find . -not -path "*/node_modules/*" \( -name "router_init.js" -o -name "router_runtime.js" -o -name "setup.mjs" \) && exit 1 || true
          grep -rn '.\{500\}' src/ --include="*.js" --include="*.ts" && echo "WARNING: long lines" || true
      - name: Check lockfile integrity
        run: |
          cp package-lock.json package-lock.json.orig
          npm install --package-lock-only --ignore-scripts
          diff package-lock.json.orig package-lock.json || (echo "ERROR: lockfile out of sync" && exit 1)

  security-python:
    name: Python security scan
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit requirements.txt
        run: pip-audit -r requirements.txt
      - name: Check known-compromised versions
        run: |
          pip show mistralai 2>/dev/null | grep -E "^Version: 2\.4\.6$" && exit 1 || true
          pip show guardrails-ai 2>/dev/null | grep -E "^Version: 0\.10\.1$" && exit 1 || true
          pip show lightning 2>/dev/null | grep -E "^Version: 2\.6\.[23]$" && exit 1 || true
      - name: Check suspicious Python patterns
        run: |
          grep -rn 'exec\s*(\s*base64' --include="*.py" . && exit 1 || true
          grep -rn '__import__\s*(' --include="*.py" . && echo "WARNING: dynamic __import__" || true

  pr-lockfile-guard:
    name: PR lockfile guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Check sensitive file changes
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36
        id: changes
        with:
          filters: |
            deps:
              - 'frontend/webui/package.json'
              - 'frontend/webui/package-lock.json'
              - 'requirements.txt'
            actions:
              - '.github/workflows/**'
      - name: Warn on dependency changes
        if: steps.changes.outputs.deps == 'true'
        run: echo "⚠️ Dependency files changed — maintainer review required."
      - name: Block workflow changes from non-maintainers
        if: steps.changes.outputs.actions == 'true' && github.actor != 'ParisNeo'
        run: |
          echo "BLOCKED: Workflow changes require @ParisNeo approval."
          exit 1